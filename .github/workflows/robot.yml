name: Homey QA Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  robot-tests:
    name: Run Robot Framework suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      selenium:
        image: selenium/standalone-chrome:4.22.0
        ports:
          - 4444:4444
        options: >-
          --shm-size=2g
          --health-cmd="/opt/bin/check-grid.sh --host 127.0.0.1 --port 4444"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=24
          --health-start-period=15s

    env:
      REMOTE_URL: http://127.0.0.1:4444/wd/hub
      ROBOT_OUTPUTDIR: results
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python --version
          pip --version
          python -m robot --version || true

      - name: Prepare results folders
        shell: bash
        run: |
          mkdir -p results
          mkdir -p docs
          mkdir -p tools
          mkdir -p config

      - name: Wait for Selenium service
        shell: bash
        run: |
          echo "Waiting for Selenium on http://127.0.0.1:4444/status ..."
          for i in {1..120}; do
            STATUS_JSON="$(curl -fsS http://127.0.0.1:4444/status 2>/dev/null || true)"
            if echo "$STATUS_JSON" | grep -q '"ready"[[:space:]]*:[[:space:]]*true'; then
              echo "Selenium is ready"
              echo "$STATUS_JSON"
              sleep 2
              exit 0
            fi
            echo "Attempt $i/120 - Selenium not ready yet..."
            sleep 1
          done

          echo "Selenium did not become ready in time"
          echo "Last /status response:"
          echo "$STATUS_JSON"
          exit 1

      - name: Run Robot smoke and regression tests
        id: robot_run
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p "${ROBOT_OUTPUTDIR}"
          set +e
          robot \
            --outputdir "${ROBOT_OUTPUTDIR}" \
            --output output.xml \
            --log NONE \
            --report NONE \
            --exclude quarantine \
            --exclude wip \
            -v REMOTE_URL:${REMOTE_URL} \
            tests
          EXIT_CODE=$?
          echo "robot_exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate Robot report
        if: always()
        shell: bash
        run: |
          mkdir -p "${ROBOT_OUTPUTDIR}"
          if [ -f "${ROBOT_OUTPUTDIR}/output.xml" ]; then
            rebot \
              --outputdir "${ROBOT_OUTPUTDIR}" \
              --name "Homey QA Automation - Regression Suite" \
              --log log.html \
              --report report.html \
              "${ROBOT_OUTPUTDIR}/output.xml"
          else
            echo "No output.xml found, skipping rebot generation."
          fi

      - name: Generate markdown test summary
        if: always()
        shell: bash
        run: |
          if [ -f "tools/generate_test_summary.py" ]; then
            python tools/generate_test_summary.py
          else
            echo "# Résumé des tests" > results/summary.md
            echo "" >> results/summary.md
            echo "Le script tools/generate_test_summary.py est absent." >> results/summary.md
          fi

      - name: Analyze failures with AI-ready rules
        if: always()
        shell: bash
        run: |
          if [ -f "tools/analyze_failures.py" ]; then
            python tools/analyze_failures.py
          else
            echo '{"warning":"tools/analyze_failures.py missing"}' > results/failure_analysis.json
          fi

      - name: Prioritize tests intelligently
        if: always()
        shell: bash
        run: |
          if [ -f "tools/prioritize_tests.py" ]; then
            python tools/prioritize_tests.py
          else
            echo '{"warning":"tools/prioritize_tests.py missing"}' > results/test_priorities.json
          fi

      - name: Generate targeted notifications
        if: always()
        shell: bash
        run: |
          if [ -f "tools/notify_targets.py" ]; then
            python tools/notify_targets.py
          else
            echo '{"warning":"tools/notify_targets.py missing"}' > results/notifications.json
          fi

      - name: Build campaign report
        if: always()
        shell: bash
        run: |
          REPORT_FILE="results/campaign_report.md"

          echo "# Rapport de campagne - Homey QA Automation" > "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "## 1. Informations générales" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "- Workflow : **${GITHUB_WORKFLOW}**" >> "$REPORT_FILE"
          echo "- Job : **${GITHUB_JOB}**" >> "$REPORT_FILE"
          echo "- Branche / Ref : **${GITHUB_REF_NAME}**" >> "$REPORT_FILE"
          echo "- Commit : **${GITHUB_SHA}**" >> "$REPORT_FILE"
          echo "- Runner : **${RUNNER_OS}**" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"

          if [ -f "results/summary.md" ]; then
            echo "## 2. Résumé global" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
            cat results/summary.md >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
          fi

          if [ -f "results/failure_analysis.json" ]; then
            echo "## 3. Analyse automatique des échecs" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
            echo '```json' >> "$REPORT_FILE"
            cat results/failure_analysis.json >> "$REPORT_FILE"
            echo '```' >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
          fi

          if [ -f "results/test_priorities.json" ]; then
            echo "## 4. Priorisation intelligente des tests" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
            echo '```json' >> "$REPORT_FILE"
            cat results/test_priorities.json >> "$REPORT_FILE"
            echo '```' >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
          fi

          if [ -f "results/notifications.json" ]; then
            echo "## 5. Notifications ciblées" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
            echo '```json' >> "$REPORT_FILE"
            cat results/notifications.json >> "$REPORT_FILE"
            echo '```' >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
          fi

      - name: Publish results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: |
            results
          if-no-files-found: warn

      - name: Add execution summary to GitHub Actions
        if: always()
        shell: bash
        run: |
          {
            echo "# Homey QA Automation"
            echo ""
            echo "- Branche : \`${GITHUB_REF_NAME}\`"
            echo "- Commit : \`${GITHUB_SHA}\`"
            echo "- Remote Selenium : \`${REMOTE_URL}\`"
            echo ""

            if [ -f "results/summary.md" ]; then
              cat results/summary.md
              echo ""
            fi

            if [ -f "results/campaign_report.md" ]; then
              echo "## Rapport détaillé"
              echo ""
              echo "Le fichier \`results/campaign_report.md\` est disponible dans les artefacts."
              echo ""
            fi

            if [ -f "results/failure_analysis.json" ]; then
              echo "## Analyse IA-ready"
              echo ""
              echo "- \`failure_analysis.json\` généré"
              echo "- \`test_priorities.json\` généré"
              echo "- \`notifications.json\` généré"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Diagnose Selenium service
        if: always()
        shell: bash
        run: |
          echo "=== docker ps -a ==="
          docker ps -a || true

          echo "=== selenium /status ==="
          curl -fsS http://127.0.0.1:4444/status || true

          echo "=== selenium logs ==="
          CONTAINER_ID="$(docker ps -aq --filter 'ancestor=selenium/standalone-chrome:4.22.0' | head -n 1)"
          if [ -n "$CONTAINER_ID" ]; then
            docker logs "$CONTAINER_ID" || true
          else
            echo "No selenium container found"
          fi

      - name: Fail workflow if tests failed
        if: always()
        shell: bash
        run: |
          EXIT_CODE="${{ steps.robot_run.outputs.robot_exit_code }}"
          echo "Robot exit code: ${EXIT_CODE}"

          if [ -z "$EXIT_CODE" ]; then
            echo "Robot step did not expose an exit code."
            exit 1
          fi

          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi
